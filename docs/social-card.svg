<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0514"/>
      <stop offset="50%" stop-color="#0e0820"/>
      <stop offset="100%" stop-color="#0a0514"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b69" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0514" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Grid lines decoration -->
  <g opacity="0.06" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="4" height="310" rx="2">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="80" y="160" width="4" height="310" rx="2" fill="url(#accentGrad)"/>

  <!-- Badge pill -->
  <rect x="100" y="155" width="220" height="32" rx="16" fill="#2d1b69" opacity="0.9"/>
  <text x="210" y="176" font-family="'Courier New', monospace" font-size="13" fill="#00e5ff"
        font-weight="700" letter-spacing="2" text-anchor="middle">PRODUCTION · PI 5</text>

  <!-- Main title -->
  <text x="100" y="265" font-family="'Arial Black', Arial, sans-serif" font-size="72"
        font-weight="900" fill="white">ShaneBrain</text>
  <text x="100" y="345" font-family="'Arial Black', Arial, sans-serif" font-size="72"
        font-weight="900" fill="url(#titleGrad)">MCP Server</text>

  <!-- Tagline -->
  <text x="100" y="390" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">
    FastMCP + Weaviate + Ollama on Raspberry Pi 5
  </text>

  <!-- Divider -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#2d1b69" stroke-width="1"/>

  <!-- Tool count — big hero number -->
  <rect x="820" y="120" width="310" height="390" rx="20" fill="#12082a" opacity="0.9"
        stroke="#2d1b69" stroke-width="1"/>
  <text x="975" y="235" font-family="'Arial Black', Arial, sans-serif" font-size="130"
        font-weight="900" fill="url(#accentGrad)" text-anchor="middle">42</text>
  <text x="975" y="285" font-family="Arial, sans-serif" font-size="18" fill="#00e5ff"
        font-weight="700" letter-spacing="3" text-anchor="middle">TOOLS</text>
  <line x1="850" y1="305" x2="1100" y2="305" stroke="#2d1b69" stroke-width="1"/>

  <!-- Stats in card -->
  <text x="900" y="345" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">12 GROUPS</text>
  <text x="900" y="368" font-family="'Courier New', monospace" font-size="20" fill="white" text-anchor="middle" font-weight="700">12</text>
  <text x="1050" y="345" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">COLLECTIONS</text>
  <text x="1050" y="368" font-family="'Courier New', monospace" font-size="20" fill="white" text-anchor="middle" font-weight="700">17</text>
  <text x="975" y="420" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">PORT</text>
  <text x="975" y="443" font-family="'Courier New', monospace" font-size="20" fill="url(#accentGrad)" text-anchor="middle" font-weight="700">8100</text>
  <text x="975" y="488" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">streamable-http · /mcp</text>

  <!-- Stats row bottom left -->
  <text x="100" y="455" font-family="Arial, sans-serif" font-size="16" fill="#a855f7">
    Knowledge · Chat · RAG · Social · Vault
  </text>
  <text x="100" y="478" font-family="Arial, sans-serif" font-size="16" fill="#a855f7">
    Notes · Drafts · Security · Ollama · Planning
  </text>

  <!-- GitHub handle -->
  <text x="100" y="575" font-family="'Courier New', monospace" font-size="18" fill="#4a5568">
    github.com/thebardchat/shanebrain_mcp
  </text>

  <!-- Footer bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#060910" opacity="0.9"/>
  <text x="600" y="619" font-family="Arial, sans-serif" font-size="11" fill="#3d5a78"
        text-anchor="middle" letter-spacing="1">
    Built by Shane Brazelton + Claude Anthropic  ·  GPL v3  ·  Hazel Green, AL
  </text>
</svg>
