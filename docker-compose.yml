version: "3.9"

# Build context must be the shanebrain-core root so weaviate_helpers.py is available.
# Run from: /mnt/shanebrain-raid/shanebrain-core/
#
#   docker compose -f mcp-server/docker-compose.yml up -d --build
#
# Or from this repo's root (standalone — uses scripts/weaviate_helpers.py in repo):
#
#   docker compose up -d --build

services:
  shanebrain-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: shanebrain-mcp:latest
    container_name: shanebrain-mcp

    # Host network so the container can reach Weaviate (8080) and the
    # Angel Cloud gateway (4200) without extra port forwarding.
    network_mode: host

    restart: unless-stopped

    environment:
      # Required — set in .env or export before running
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}

      # Optional overrides (defaults shown)
      MCP_PORT: ${MCP_PORT:-8100}
      GCAL_TOKEN_PATH: ${GCAL_TOKEN_PATH:-/app/gcal_token.json}
      GCAL_CALENDAR_ID: ${GCAL_CALENDAR_ID:-primary}
      PLANNING_DIR: ${PLANNING_DIR:-/app/planning}
      WEAVIATE_HOST: ${WEAVIATE_HOST:-localhost}
      WEAVIATE_PORT: ${WEAVIATE_PORT:-8080}
      WEAVIATE_GRPC_PORT: ${WEAVIATE_GRPC_PORT:-50051}

    volumes:
      # Google Calendar token — read-write so refreshed tokens persist
      - /mnt/shanebrain-raid/shanebrain-core/scripts/gcal_token.json:/app/gcal_token.json:rw

      # Planning system — MUST be mounted or plans are lost on container restart
      - /mnt/shanebrain-raid/shanebrain-core/planning-system:/app/planning:rw

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
